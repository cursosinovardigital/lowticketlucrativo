<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Ticket Lucrativo | Método Víctor Trivinho</title>
    
    <!-- Tag de Verificação do Google -->
    <meta name="google-site-verification" content="2ROwP7OPCiEaFvrgnmBBXlmgdzVLOo0lSwdGM-UgIfI" />
    
    <style>
        :root { --primary: #00ff82; --dark: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; margin: 0; overflow-x: hidden; }
        
        .hero { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: auto; padding: 80px 20px; gap: 40px; }
        .hero-text { flex: 1; }
        .hero-image { flex: 1; text-align: center; }
        .hero-image img { width: 100%; max-width: 480px; border-radius: 24px; box-shadow: 0 0 60px rgba(0,255,130,0.1); }

        h1 { font-size: 3.8rem; font-weight: 900; line-height: 1; margin: 0 0 25px; }
        h1 span { color: var(--primary); }
        
        .checklist { list-style: none; padding: 0; margin: 30px 0; }
        .checklist li { margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; }
        .checklist li::before { content: '❌'; }

        /* BOTÃO PULSANTE - O SEGREDO DA CONVERSÃO */
        .cta-btn { 
            display: inline-block; background: var(--primary); color: #000; padding: 25px 60px; 
            font-size: 1.5rem; font-weight: 900; border-radius: 100px; text-decoration: none;
            transition: 0.4s; text-transform: uppercase; margin-top: 40px;
            box-shadow: 0 0 0 0 rgba(0, 255, 130, 0.7);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 130, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 255, 130, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 130, 0); }
        }

        .cta-btn:hover { transform: scale(1.1); filter: brightness(1.1); }

        /* Carrossel e Provas */
        .carousel-container { padding: 60px 0; background: #070e1d; overflow: hidden; }
        .carousel-track { display: flex; width: calc(300px * 10); animation: scroll 30s linear infinite; }
        .slide { width: 300px; padding: 0 15px; flex-shrink: 0; }
        .slide img { width: 100%; border-radius: 15px; border: 2px solid #1e293b; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 5)); }
        }

        /* Rodapé com Logo Kiwify */
        .revenue-info { padding: 80px 20px; text-align: center; }
        .revenue-card { 
            background: #fff; color: #020617; padding: 40px; border-radius: 20px; 
            max-width: 500px; margin: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .revenue-card h2 { font-size: 3rem; margin: 10px 0; font-weight: 900; }
        
        .kiwify-footer-img { width: 100%; max-width: 180px; margin-top: 20px; opacity: 0.9; }

        @media (max-width: 900px) {
            .hero { flex-direction: column; text-align: center; }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-text">
            <h1>Copie o meu <span>Low Ticket</span> e venda no automático</h1>
            <ul class="checklist">
                <li>Sem precisar produzir conteúdo</li>
                <li>Sem precisar aparecer</li>
                <li>Sem depender de seguidores</li>
            </ul>
            <a href="https://kiwify.app/Ud3sieV?afid=2uYO7ipL" class="cta-btn">Quero começar agora</a>
        </div>
        <div class="hero-image">
            <img src="produto1.jpg" alt="Resultados Víctor Trivinho">
        </div>
    </section>

    <div class="carousel-container">
        <div class="carousel-track">
            <div class="slide"><img src="img1.png"></div>
            <div class="slide"><img src="img2.png"></div>
            <div class="slide"><img src="img3.png"></div>
            <div class="slide"><img src="img4.png"></div>
            <div class="slide"><img src="img5.png"></div>
            <!-- Repetição -->
            <div class="slide"><img src="img1.png"></div>
            <div class="slide"><img src="img2.png"></div>
            <div class="slide"><img src="img3.png"></div>
            <div class="slide"><img src="img4.png"></div>
            <div class="slide"><img src="img5.png"></div>
        </div>
    </div>

    <section class="revenue-info">
        <div class="revenue-card">
            <span style="font-weight:700; color:#64748b;">Valor Líquido Recebido</span>
            <h2>R$ 63.455,86</h2>
            <img src="kiwify-logo.png" class="kiwify-footer-img" alt="Pagamento Seguro Kiwify">
        </div>
        <p style="margin-top: 40px; color: #475569; font-size: 0.9rem;">
            Inovar Digital © 2026 - Víctor Trivinho - Guarulhos, SP
        </p>
    </section>

</body>
</html>
